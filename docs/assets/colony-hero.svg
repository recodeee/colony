<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="Colony: local-first coordination for coding agents. Coordinates Claude Code, Codex, Cursor, Gemini CLI, OpenCode.">
  <defs>
    <radialGradient id="heroBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#020610"/>
    </radialGradient>
    <radialGradient id="heroCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="subPill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="termHeader" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="heroGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Orbit paths for connection lines -->
    <symbol id="runtimeNode" overflow="visible">
      <circle r="34" fill="#0f172a" stroke="currentColor" stroke-width="1.5"/>
      <circle r="34" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.4">
        <animate attributeName="r" values="34;42;34" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
      </circle>
    </symbol>
  </defs>

  <rect width="1200" height="480" fill="url(#heroBg)"/>

  <!-- Subtle grid backdrop -->
  <g stroke="#0f172a" stroke-width="1" opacity="0.5">
    <path d="M 0 80 H 1200 M 0 160 H 1200 M 0 240 H 1200 M 0 320 H 1200 M 0 400 H 1200"/>
    <path d="M 200 0 V 480 M 400 0 V 480 M 600 0 V 480 M 800 0 V 480 M 1000 0 V 480"/>
  </g>

  <!-- ============================ LEFT SIDE: brand + intro ============================ -->

  <!-- Hex logo -->
  <g transform="translate(80 80)">
    <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13" fill="#020617" stroke="#22d3ee" stroke-width="1.5"/>
    <circle r="8" fill="#22d3ee" filter="url(#heroGlow)">
      <animate attributeName="r" values="7;10;7" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark -->
  <text x="130" y="100" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="64" font-weight="700" fill="url(#titleGrad)" letter-spacing="-1">Colony</text>

  <!-- Tagline -->
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#22d3ee" font-weight="500">Local-first coordination for coding agents</text>

  <!-- Description -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#94a3b8">
    <text x="80" y="186">Claims, handoffs, plans, health, and memory for Claude Code,</text>
    <text x="80" y="206">Codex, Cursor, Gemini CLI, OpenCode, and other agent runtimes.</text>
  </g>

  <!-- Badge pills -->
  <g transform="translate(80 232)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
    <g transform="translate(0 0)">
      <rect width="80" height="28" rx="6" fill="url(#subPill)" stroke="#1e293b"/>
      <circle cx="14" cy="14" r="5" fill="#0f172a" stroke="#94a3b8" stroke-width="1"/>
      <text x="13" y="17" text-anchor="middle" fill="#94a3b8" font-size="9">&#9878;</text>
      <text x="28" y="18" fill="#cbd5e1">MIT</text>
    </g>
    <g transform="translate(96 0)">
      <rect width="100" height="28" rx="6" fill="url(#subPill)" stroke="#1e293b"/>
      <circle cx="14" cy="14" r="5" fill="#0f172a" stroke="#3b82f6"/>
      <text x="28" y="18" fill="#cbd5e1">Node 20+</text>
    </g>
    <g transform="translate(212 0)">
      <rect width="120" height="28" rx="6" fill="url(#subPill)" stroke="#1e293b"/>
      <text x="14" y="18" fill="#10b981" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">&gt;_</text>
      <text x="34" y="18" fill="#cbd5e1">CLI: <tspan fill="#10b981" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">colony</tspan></text>
    </g>
    <g transform="translate(348 0)">
      <rect width="180" height="28" rx="6" fill="url(#subPill)" stroke="#1e293b"/>
      <text x="14" y="18" fill="#a78bfa">&#10070;</text>
      <text x="34" y="18" fill="#cbd5e1">MCP namespace: <tspan fill="#a78bfa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">colony</tspan></text>
    </g>
  </g>

  <!-- Terminal -->
  <g transform="translate(80 290)">
    <rect width="500" height="130" rx="10" fill="#020617" stroke="#1e293b" stroke-width="1"/>
    <rect width="500" height="28" rx="10" fill="url(#termHeader)"/>
    <rect y="14" width="500" height="14" fill="url(#termHeader)"/>
    <circle cx="16" cy="14" r="5" fill="#ef4444"/>
    <circle cx="34" cy="14" r="5" fill="#f59e0b"/>
    <circle cx="52" cy="14" r="5" fill="#10b981"/>
    <text x="464" y="18" text-anchor="end" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">$ colony</text>

    <!-- Terminal lines (typed effect via animation) -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <text x="20" y="58" fill="#10b981">&gt;</text>
      <text x="36" y="58" fill="#cbd5e1">npm install -g <tspan fill="#a78bfa">@imdeadpool/colony-cli</tspan></text>

      <text x="20" y="82" fill="#10b981">&gt;</text>
      <text x="36" y="82" fill="#cbd5e1">colony install <tspan fill="#22d3ee">--ide</tspan> codex</text>

      <text x="20" y="106" fill="#10b981">&gt;</text>
      <text x="36" y="106" fill="#cbd5e1">colony health</text>

      <!-- blinking cursor -->
      <rect x="180" y="96" width="8" height="14" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Tagline -->
  <g transform="translate(80 442)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
    <text fill="#64748b">Runtimes run agents.</text>
    <text x="148" fill="#22d3ee" font-weight="600">Colony coordinates agents.</text>
  </g>

  <!-- ============================ RIGHT SIDE: orbit diagram ============================ -->

  <!-- Connection lines from runtimes to core (drawn first so they sit behind) -->
  <g stroke="#0e7490" stroke-width="1" fill="none" opacity="0.6">
    <line x1="935" y1="240" x2="1085" y2="120"/>
    <line x1="935" y1="240" x2="1140" y2="240"/>
    <line x1="935" y1="240" x2="1085" y2="360"/>
    <line x1="935" y1="240" x2="785" y2="360"/>
    <line x1="935" y1="240" x2="785" y2="120"/>
  </g>
  <!-- Animated cyan dashes flowing inward on each line -->
  <g stroke="#22d3ee" stroke-width="1" fill="none" stroke-dasharray="4 8" opacity="0.85">
    <line x1="935" y1="240" x2="1085" y2="120">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="935" y1="240" x2="1140" y2="240">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="935" y1="240" x2="1085" y2="360">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="935" y1="240" x2="785" y2="360">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="935" y1="240" x2="785" y2="120">
      <animate attributeName="stroke-dashoffset" values="0;-24" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Orbit ring -->
  <circle cx="935" cy="240" r="180" fill="none" stroke="#0e7490" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.6"/>

  <!-- Core: Colony -->
  <g transform="translate(935 240)">
    <circle r="180" fill="url(#heroCore)" opacity="0.4"/>
    <circle r="80" fill="#020617" stroke="#22d3ee" stroke-width="2" filter="url(#heroGlow)"/>
    <circle r="80" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="78;90;78" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text y="-6" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600">Colony</text>
    <text y="14" text-anchor="middle" fill="#22d3ee" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" letter-spacing="1.5">COORDINATION</text>
    <text y="28" text-anchor="middle" fill="#22d3ee" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" letter-spacing="1.5">SUBSTRATE</text>
  </g>

  <!-- Runtime nodes (5 around the orbit) -->
  <!-- top right: Codex -->
  <g transform="translate(1085 120)" color="#94a3b8">
    <use href="#runtimeNode"/>
    <text y="-2" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">&gt;_</text>
    <text y="50" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Codex</text>
  </g>
  <!-- right: Cursor -->
  <g transform="translate(1140 240)" color="#cbd5e1">
    <use href="#runtimeNode"/>
    <path d="M -8 -10 L 8 -2 L -2 0 L -4 10 Z" fill="#cbd5e1"/>
    <text y="50" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Cursor</text>
  </g>
  <!-- bottom right: OpenCode -->
  <g transform="translate(1085 360)" color="#fb923c">
    <use href="#runtimeNode"/>
    <text y="3" text-anchor="middle" fill="#fb923c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">&lt;/&gt;</text>
    <text y="50" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">OpenCode</text>
  </g>
  <!-- bottom left: Gemini CLI -->
  <g transform="translate(785 360)" color="#60a5fa">
    <use href="#runtimeNode"/>
    <path d="M 0 -12 L 3 -3 L 12 0 L 3 3 L 0 12 L -3 3 L -12 0 L -3 -3 Z" fill="#60a5fa" opacity="0.9"/>
    <text y="50" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Gemini CLI</text>
  </g>
  <!-- top left: Claude -->
  <g transform="translate(785 120)" color="#d97706">
    <use href="#runtimeNode"/>
    <path d="M -10 8 L -3 -10 L 3 -10 L 10 8 L 7 8 L 3 -2 L -3 -2 L -7 8 Z" fill="#d97706"/>
    <text y="50" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Claude</text>
  </g>

  <!-- Inbound packets: small dots flying from each runtime to core -->
  <g filter="url(#softGlow2)">
    <circle r="3" fill="#22d3ee">
      <animate attributeName="cx" values="1085;935" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;240" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#34d399">
      <animate attributeName="cx" values="1140;935" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="240;240" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#a78bfa">
      <animate attributeName="cx" values="1085;935" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="360;240" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#60a5fa">
      <animate attributeName="cx" values="785;935" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="360;240" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#fbbf24">
      <animate attributeName="cx" values="785;935" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;240" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom hint pill: the Colony loop -->
  <g transform="translate(660 438)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">
    <rect width="500" height="30" rx="15" fill="#020617" stroke="#1e293b" stroke-width="1"/>
    <text x="18" y="20" fill="#22d3ee">hivemind_context</text>
    <text x="142" y="20" fill="#475569">&#8594;</text>
    <text x="154" y="20" fill="#60a5fa">attention_inbox</text>
    <text x="262" y="20" fill="#475569">&#8594;</text>
    <text x="274" y="20" fill="#a78bfa">task_ready_for_agent</text>
    <text x="420" y="20" fill="#475569">&#8594;</text>
    <text x="432" y="20" fill="#34d399">claim &amp; edit</text>
  </g>
</svg>
