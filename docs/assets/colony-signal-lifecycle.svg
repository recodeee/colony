<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Signal lifecycle: fresh traces are reinforced or decay, expire, and are swept">
  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#100a0e"/>
    </linearGradient>
    <linearGradient id="freshGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="decayGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="75%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="sigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="360" fill="url(#bgFade)"/>

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">Signal lifecycle</text>
    <text x="450" y="58" text-anchor="middle" fill="#64748b" font-size="12">Fresh traces guide. Useful traces get reinforced. Stale traces evaporate.</text>
  </g>

  <!-- Timeline rail -->
  <line x1="80" y1="200" x2="820" y2="200" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="200" x2="820" y2="200" stroke="url(#decayGrad)" stroke-width="3" opacity="0.6"/>

  <!-- Tick marks + labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#64748b">
    <g transform="translate(120 200)">
      <line y1="-6" y2="6" stroke="#475569"/>
      <text y="22" text-anchor="middle">t=0</text>
    </g>
    <g transform="translate(310 200)">
      <line y1="-6" y2="6" stroke="#475569"/>
      <text y="22" text-anchor="middle">+30m</text>
    </g>
    <g transform="translate(500 200)">
      <line y1="-6" y2="6" stroke="#475569"/>
      <text y="22" text-anchor="middle">+2h</text>
    </g>
    <g transform="translate(690 200)">
      <line y1="-6" y2="6" stroke="#475569"/>
      <text y="22" text-anchor="middle">+TTL</text>
    </g>
  </g>

  <!-- ============= STAGE 1: FRESH ============= -->
  <g transform="translate(120 200)">
    <!-- pulsing aura -->
    <circle r="22" fill="#22d3ee" opacity="0.15">
      <animate attributeName="r" values="20;30;20" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0;0.25" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="14" fill="url(#freshGrad)" filter="url(#sigGlow)"/>
    <circle r="14" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.7"/>
    <text y="-46" text-anchor="middle" fill="#67e8f9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">Fresh</text>
    <text y="-30" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">claim posted</text>
  </g>

  <!-- ============= STAGE 2: REINFORCED (branch up) ============= -->
  <g transform="translate(310 200)">
    <!-- branching arrow up -->
    <path d="M 0 0 Q 0 -50 -10 -75" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
    <circle r="11" fill="#022c22" stroke="#34d399" stroke-width="1.5">
      <animate attributeName="r" values="11;13;11" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M -3 0 L -1 3 L 4 -3" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- reinforced label up top -->
    <g transform="translate(-10 -90)">
      <rect x="-50" y="-14" width="100" height="22" rx="11" fill="#052e1f" stroke="#10b981"/>
      <text y="2" text-anchor="middle" fill="#6ee7b7" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">reinforced &#8593;</text>
    </g>
  </g>

  <!-- ============= STAGE 3: DECAYING ============= -->
  <g transform="translate(500 200)">
    <circle r="11" fill="#3b2a0a" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <!-- evaporation particles -->
    <g fill="#fbbf24" opacity="0.8">
      <circle r="1.5" cy="-14">
        <animate attributeName="cy" values="-14;-44" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle r="1.2" cx="-5" cy="-14">
        <animate attributeName="cy" values="-14;-50" dur="2.2s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0" dur="2.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle r="1.2" cx="6" cy="-14">
        <animate attributeName="cy" values="-14;-46" dur="2s" begin="0.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text y="-50" text-anchor="middle" fill="#fbbf24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">Decaying</text>
    <text y="-34" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">half-life ticks</text>
  </g>

  <!-- ============= STAGE 4: EXPIRED / SWEEP ============= -->
  <g transform="translate(690 200)">
    <circle r="11" fill="none" stroke="#7f1d1d" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <line x1="-7" y1="7" x2="7" y2="-7" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text y="-46" text-anchor="middle" fill="#fca5a5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600">Expired</text>
    <text y="-30" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">colony sweep</text>
  </g>

  <!-- Sweep brush passing through -->
  <g filter="url(#sigGlow)" opacity="0.8">
    <rect x="-30" y="180" width="30" height="40" rx="3" fill="#22d3ee" opacity="0.25">
      <animate attributeName="x" values="-30;860" dur="9s" begin="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Legend / Biology to Colony -->
  <g transform="translate(80 290)" font-family="ui-sans-serif, system-ui, sans-serif">
    <text fill="#64748b" font-size="11">Stigmergic model:</text>
    <g transform="translate(115 0)">
      <text fill="#94a3b8" font-size="11"><tspan fill="#67e8f9">pheromone</tspan> &#8594; claim &#8226; <tspan fill="#67e8f9">evaporation</tspan> &#8594; TTL/sweep &#8226; <tspan fill="#67e8f9">queen</tspan> &#8594; plan publisher (not commander)</text>
    </g>
  </g>

  <!-- Bottom annotation: the 4 outcomes -->
  <g transform="translate(0 320)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">
    <text x="120" text-anchor="middle">warns other agents</text>
    <text x="310" text-anchor="middle">promoted to plan</text>
    <text x="500" text-anchor="middle">stops blocking work</text>
    <text x="690" text-anchor="middle">removed from view</text>
  </g>
</svg>
