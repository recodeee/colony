<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-label="Signal lifecycle: an agent posts a claim, the trace decays over time, other agents can reinforce it or it expires and gets swept">
  <defs>
    <linearGradient id="lifeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1830"/>
      <stop offset="100%" stop-color="#020610"/>
    </linearGradient>

    <!-- Core gradient: cyan core -> faint -->
    <linearGradient id="trailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="25%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Glow gradient for the strength curve -->
    <linearGradient id="strengthGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="80%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1c2c"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <filter id="lifeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow3" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Agent ring -->
    <symbol id="lifeAgent" overflow="visible">
      <circle r="16" fill="#0f172a" stroke="currentColor" stroke-width="1.4"/>
    </symbol>

    <!-- Sweep brush (broom-like shape that sweeps right-to-left across expired zone) -->
    <symbol id="sweepBrush" overflow="visible">
      <rect x="-10" y="-30" width="2" height="50" fill="#22d3ee" opacity="0.6"/>
      <g opacity="0.7">
        <line x1="-10" y1="20" x2="-12" y2="32" stroke="#22d3ee" stroke-width="1.2"/>
        <line x1="-7" y1="20" x2="-7" y2="34" stroke="#22d3ee" stroke-width="1.2"/>
        <line x1="-4" y1="20" x2="-2" y2="32" stroke="#22d3ee" stroke-width="1.2"/>
      </g>
    </symbol>
  </defs>

  <rect width="960" height="560" fill="url(#lifeBg)"/>

  <!-- Background grid -->
  <g stroke="#0c1a2e" stroke-width="1" opacity="0.5">
    <path d="M 0 100 H 960 M 0 200 H 960 M 0 300 H 960 M 0 400 H 960 M 0 500 H 960"/>
    <path d="M 200 0 V 560 M 400 0 V 560 M 600 0 V 560 M 800 0 V 560"/>
  </g>

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <text x="480" y="38" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="600">Signal lifecycle</text>
    <text x="480" y="60" text-anchor="middle" fill="#64748b" font-size="13">Agents leave traces. Useful traces get reinforced. Stale traces evaporate.</text>
  </g>

  <!-- ============================ LEFT SIDE: agent + biology mapping ============================ -->

  <!-- Agent posting the trace -->
  <g transform="translate(80 240)">
    <!-- Pulsing aura indicating the agent is "emitting" -->
    <circle r="22" fill="#22d3ee" opacity="0.15">
      <animate attributeName="r" values="20;30;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0;0.25" dur="2s" repeatCount="indefinite"/>
    </circle>
    <g color="#22d3ee">
      <use href="#lifeAgent"/>
    </g>
    <text y="5" text-anchor="middle" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700">&gt;_</text>
    <text y="36" text-anchor="middle" fill="#67e8f9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600">Codex</text>
    <text y="50" text-anchor="middle" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9.5">posts a claim</text>
  </g>

  <!-- Animated pulse from agent into the trail -->
  <g filter="url(#dotGlow3)">
    <circle r="3" fill="#22d3ee">
      <animate attributeName="cx" values="96;160" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="240;240" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#22d3ee">
      <animate attributeName="cx" values="96;160" dur="1.6s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="240;240" dur="1.6s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" dur="1.6s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============================ MAIN: signal trail visualization ============================ -->

  <!-- Time axis -->
  <line x1="160" y1="240" x2="860" y2="240" stroke="#1e293b" stroke-width="1"/>

  <!-- The signal trail itself - a horizontal "puff" of pheromone laid down then fading -->
  <!-- Strength area underneath (filled curve showing how strong the signal is at each point in time) -->
  <path d="M 160 240 L 160 195 Q 240 180 320 200 Q 400 215 460 230 Q 520 240 580 235 Q 640 230 700 232 Q 750 234 800 240 L 800 240 L 160 240 Z"
        fill="url(#strengthGrad)" opacity="0.6"/>

  <!-- The trail itself - solid colored line tracing strength over time -->
  <path d="M 160 195 Q 240 180 320 200 Q 400 215 460 230 Q 520 240 580 235 Q 640 230 700 232 Q 750 234 800 240"
        fill="none" stroke="url(#trailGrad)" stroke-width="3" filter="url(#lifeGlow)"/>

  <!-- Particle dots floating up and dispersing along the trail (the "pheromone evaporating") -->
  <g filter="url(#dotGlow3)">
    <!-- particles in the decaying middle section -->
    <circle r="1.5" fill="#a78bfa" opacity="0.8">
      <animate attributeName="cy" values="220;180" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="420;418" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.2" fill="#a78bfa" opacity="0.7">
      <animate attributeName="cy" values="225;175" dur="3.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="500;498" dur="3.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="3.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.4" fill="#f59e0b" opacity="0.7">
      <animate attributeName="cy" values="232;180" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="600;598" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.2" fill="#f59e0b" opacity="0.6">
      <animate attributeName="cy" values="234;186" dur="2.8s" begin="1.7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="660;658" dur="2.8s" begin="1.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2.8s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.2" fill="#ef4444" opacity="0.5">
      <animate attributeName="cy" values="240;200" dur="2.5s" begin="2.1s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="740;738" dur="2.5s" begin="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.5s" begin="2.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Reinforcement spike: another agent reads it at +30m and bumps the strength back up -->
  <g transform="translate(280 195)">
    <!-- Reinforcement burst -->
    <circle r="8" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0">
      <animate attributeName="r" values="2;18" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#34d399" filter="url(#dotGlow3)">
      <animate attributeName="r" values="3;5;3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <!-- label pill -->
    <g transform="translate(36 -4)">
      <rect x="-2" y="-9" width="78" height="18" rx="9" fill="#022c22" stroke="#34d399" stroke-width="0.8"/>
      <text x="37" y="3" text-anchor="middle" fill="#6ee7b7" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600">+ reinforced</text>
    </g>
  </g>

  <!-- Reading agent (above) - causes the reinforcement -->
  <g transform="translate(280 130)">
    <g color="#34d399">
      <use href="#lifeAgent"/>
    </g>
    <g fill="#6ee7b7">
      <path d="M -6 8 L -2 -7 L 2 -7 L 6 8 L 4 8 L 1 1 L -1 1 L -4 8 Z"/>
    </g>
    <text y="-22" text-anchor="middle" fill="#6ee7b7" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600">Claude reads it</text>
  </g>
  <!-- dashed line from reading agent down to reinforcement point -->
  <line x1="280" y1="148" x2="280" y2="190" stroke="#34d399" stroke-width="1" stroke-dasharray="3 3" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Time axis tick marks + state labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#64748b">
    <!-- t=0 -->
    <g transform="translate(160 240)">
      <line y1="-5" y2="5" stroke="#475569"/>
      <text y="22" text-anchor="middle">t=0</text>
    </g>
    <!-- +30m -->
    <g transform="translate(280 240)">
      <line y1="-5" y2="5" stroke="#475569"/>
      <text y="22" text-anchor="middle">+30m</text>
    </g>
    <!-- +2h -->
    <g transform="translate(500 240)">
      <line y1="-5" y2="5" stroke="#475569"/>
      <text y="22" text-anchor="middle">+2h</text>
    </g>
    <!-- +6h -->
    <g transform="translate(680 240)">
      <line y1="-5" y2="5" stroke="#475569"/>
      <text y="22" text-anchor="middle">+6h</text>
    </g>
    <!-- TTL -->
    <g transform="translate(800 240)">
      <line y1="-5" y2="5" stroke="#475569"/>
      <text y="22" text-anchor="middle">+TTL</text>
    </g>
  </g>

  <!-- State labels above with brackets showing zones -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600">
    <!-- Fresh zone bracket: 160-280 -->
    <g transform="translate(160 100)">
      <line x1="0" y1="0" x2="120" y2="0" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
      <line x1="120" y1="0" x2="120" y2="6" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
      <text x="60" y="-6" text-anchor="middle" fill="#22d3ee">Fresh</text>
    </g>
    <!-- Decaying zone bracket: 280-680 -->
    <g transform="translate(280 100)">
      <line x1="0" y1="0" x2="400" y2="0" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
      <line x1="400" y1="0" x2="400" y2="6" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
      <text x="200" y="-6" text-anchor="middle" fill="#a78bfa">Decaying (half-life ticks)</text>
    </g>
    <!-- Expired zone bracket: 680-800 -->
    <g transform="translate(680 100)">
      <line x1="0" y1="0" x2="120" y2="0" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
      <line x1="120" y1="0" x2="120" y2="6" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
      <text x="60" y="-6" text-anchor="middle" fill="#ef4444">Expired</text>
    </g>
  </g>

  <!-- Strength axis label on the left of the trail area -->
  <g transform="translate(140 195)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">
    <text text-anchor="end" y="0">strong</text>
    <text text-anchor="end" y="45">weak</text>
  </g>

  <!-- Sweep brush sweeping through the expired zone -->
  <g>
    <use href="#sweepBrush" transform="translate(680 240)">
      <animateTransform attributeName="transform" type="translate" values="900 240; 680 240; 660 240" keyTimes="0; 0.5; 1" dur="6s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0; 0.1; 0.85; 1" dur="6s" begin="2s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- "swept" annotation -->
  <g transform="translate(800 280)">
    <text text-anchor="middle" fill="#7f1d1d" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-style="italic">colony sweep removes it</text>
  </g>

  <!-- ============================ BOTTOM: stigmergic mapping (biology -> Colony) ============================ -->

  <g transform="translate(80 360)">
    <!-- Section title -->
    <rect x="0" y="0" width="3" height="14" fill="#22d3ee"/>
    <text x="14" y="11" fill="#22d3ee" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="2">STIGMERGIC MODEL</text>
    <text x="170" y="11" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">how biology maps to Colony</text>
  </g>

  <!-- Six mapping cards -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <!-- Card 1: ant -> agent -->
    <g transform="translate(80 390)">
      <rect width="125" height="74" rx="8" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1"/>
      <text x="62.5" y="16" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1.5" font-weight="600">BIOLOGY</text>
      <text x="62.5" y="32" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">ant</text>
      <text x="62.5" y="48" text-anchor="middle" fill="#1e293b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">↓</text>
      <text x="62.5" y="65" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">agent session</text>
    </g>

    <!-- Card 2: nest -> repo -->
    <g transform="translate(217 390)">
      <rect width="125" height="74" rx="8" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1"/>
      <text x="62.5" y="16" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1.5" font-weight="600">BIOLOGY</text>
      <text x="62.5" y="32" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">nest</text>
      <text x="62.5" y="48" text-anchor="middle" fill="#1e293b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">↓</text>
      <text x="62.5" y="65" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">repository</text>
    </g>

    <!-- Card 3: pheromone -> claim/handoff (highlighted) -->
    <g transform="translate(354 390)">
      <rect width="125" height="74" rx="8" fill="url(#cardGrad)" stroke="#22d3ee" stroke-width="1.2"/>
      <text x="62.5" y="16" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1.5" font-weight="600">BIOLOGY</text>
      <text x="62.5" y="32" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="600">pheromone</text>
      <text x="62.5" y="48" text-anchor="middle" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">↓</text>
      <text x="62.5" y="65" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">claim · handoff</text>
    </g>

    <!-- Card 4: evaporation -> TTL/sweep -->
    <g transform="translate(491 390)">
      <rect width="125" height="74" rx="8" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1"/>
      <text x="62.5" y="16" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1.5" font-weight="600">BIOLOGY</text>
      <text x="62.5" y="32" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">evaporation</text>
      <text x="62.5" y="48" text-anchor="middle" fill="#1e293b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">↓</text>
      <text x="62.5" y="65" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">TTL · sweep</text>
    </g>

    <!-- Card 5: response threshold -> ready-work ranking -->
    <g transform="translate(628 390)">
      <rect width="125" height="74" rx="8" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="1"/>
      <text x="62.5" y="16" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1.5" font-weight="600">BIOLOGY</text>
      <text x="62.5" y="32" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">threshold</text>
      <text x="62.5" y="48" text-anchor="middle" fill="#1e293b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">↓</text>
      <text x="62.5" y="65" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">ready ranking</text>
    </g>

    <!-- Card 6: queen -> plan publisher (highlighted) -->
    <g transform="translate(765 390)">
      <rect width="125" height="74" rx="8" fill="url(#cardGrad)" stroke="#a78bfa" stroke-width="1"/>
      <text x="62.5" y="16" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1.5" font-weight="600">BIOLOGY</text>
      <text x="62.5" y="32" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">queen</text>
      <text x="62.5" y="48" text-anchor="middle" fill="#a78bfa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">↓</text>
      <text x="62.5" y="65" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">plan publisher</text>
    </g>
  </g>

  <!-- ============================ BOTTOM: 4 outcomes summary ============================ -->

  <g transform="translate(80 496)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">
    <text x="0" y="0" fill="#475569" letter-spacing="2" font-size="9.5" font-weight="600">PRACTICAL EFFECTS</text>

    <g transform="translate(0 18)">
      <circle cx="6" cy="-2" r="3" fill="#22d3ee"/>
      <text x="16" y="2" fill="#94a3b8">fresh claims warn other agents before they edit</text>
    </g>
    <g transform="translate(280 18)">
      <circle cx="6" cy="-2" r="3" fill="#34d399"/>
      <text x="16" y="2" fill="#94a3b8">useful traces get reinforced and promoted</text>
    </g>
    <g transform="translate(540 18)">
      <circle cx="6" cy="-2" r="3" fill="#f59e0b"/>
      <text x="16" y="2" fill="#94a3b8">old traces weaken so they stop blocking</text>
    </g>
    <g transform="translate(0 38)">
      <circle cx="6" cy="-2" r="3" fill="#ef4444"/>
      <text x="16" y="2" fill="#94a3b8">expired traces are swept</text>
    </g>
    <g transform="translate(280 38)">
      <circle cx="6" cy="-2" r="3" fill="#a78bfa"/>
      <text x="16" y="2" fill="#94a3b8">Queen waves unlock in order, no shells assigned</text>
    </g>
    <g transform="translate(540 38)">
      <circle cx="6" cy="-2" r="3" fill="#67e8f9"/>
      <text x="16" y="2" fill="#94a3b8">agents hydrate only what they need</text>
    </g>
  </g>
</svg>
